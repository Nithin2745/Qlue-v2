name: Deploy Qlue Backend

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package.json
      - name: Install dependencies
        working-directory: backend
        run: npm ci
      - name: Run Jest
        working-directory: backend
        run: npm run test -- --coverage --coverageThreshold='{"global":{"statements":80,"branches":80,"functions":80,"lines":80}}'

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package.json
      - name: Install dependencies
        working-directory: backend
        run: npm ci
      - name: Run ESLint
        working-directory: backend
        run: npm run lint -- --max-warnings=0

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run NPM Audit
        working-directory: backend
        run: npm audit --audit-level=high

  build:
    needs: [test, lint, security]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/setup-sam@v2
      - name: SAM Build
        working-directory: backend
        run: sam build
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sam-build
          path: backend/.aws-sam/

  deploy-dev:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions-deploy-role
          aws-region: ap-south-1
      - uses: aws-actions/setup-sam@v2
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          name: sam-build
          path: backend/.aws-sam/
      - name: SAM Deploy to Dev
        working-directory: backend
        run: sam deploy --config-env dev --no-confirm-changeset --no-fail-on-empty-changeset

  deploy-prod:
    needs: deploy-dev
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://api.qlue.app
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions-deploy-role
          aws-region: ap-south-1
      - uses: aws-actions/setup-sam@v2
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          name: sam-build
          path: backend/.aws-sam/
      - name: SAM Deploy to Prod
        working-directory: backend
        run: sam deploy --config-env prod --no-confirm-changeset --no-fail-on-empty-changeset

  notify:
    needs: [deploy-dev, deploy-prod]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Send Slack Notification
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_COLOR: '#FF0000'
          SLACK_MESSAGE: 'Qlue Deployment Pipeline Failed! :x:'
          SLACK_TITLE: Build Failure
