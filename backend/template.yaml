AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: Qlue AI-powered voice interview simulation mobile app.

Globals:
  Function:
    Runtime: nodejs20.x
    Layers:
      - !Ref QlueSharedLayer
      - !Ref AppDependenciesLayer

    Environment:
      Variables:
        USERS_TABLE: !Ref QlueCoreTableV2
        RESUMES_TABLE: !Ref QlueCoreTableV2
        SESSIONS_TABLE: !Ref QlueCoreTableV2
        TRANSCRIPTS_TABLE: !Ref TranscriptsTableV2
        FEEDBACK_TABLE: !Ref QlueCoreTableV2
        CONCEPT_STATES_TABLE: !Ref QlueCoreTableV2
        WS_CONNECTIONS_TABLE: !Ref WSConnectionsTableV2
        NOTIFICATIONS_TABLE: !Ref QlueCoreTableV2
        USERS_TABLE_V2: !Ref QlueCoreTableV2
        RESUMES_TABLE_V2: !Ref QlueCoreTableV2
        SESSIONS_TABLE_V2: !Ref QlueCoreTableV2
        TRANSCRIPTS_TABLE_V2: !Ref TranscriptsTableV2
        FEEDBACK_TABLE_V2: !Ref QlueCoreTableV2
        WS_CONNECTIONS_TABLE_V2: !Ref WSConnectionsTableV2
        NOTIFICATIONS_TABLE_V2: !Ref QlueCoreTableV2
        FIREBASE_SECRET_ID: !Ref FirebaseServiceAccountSecret
        BEDROCK_SECRET_ID: !Ref BedrockConfigSecret
        SCRAPER_SECRET_ID: !Ref ScraperApiKeySecret
        FCM_SECRET_ID: !Ref FcmServerKeySecret
        RESUMES_BUCKET: !Ref ResumesBucket
        SCRAPED_CONTENT_BUCKET: !Ref ScrapedContentBucket
        FEEDBACK_TOPIC_ARN: !Ref FeedbackTriggerTopic
        WEBSOCKET_ENDPOINT: !Sub "https://${WebSocketApi}.execute-api.${AWS::Region}.amazonaws.com/prod"
        BEDROCK_MODEL_ID: "nvidia.nemotron-super-3-120b"
        ALLOWED_VOICES: "Tiffany,Ruth,Joanna,Matthew,Stephen"

Conditions:
  IsProd: !Equals [!Ref "AWS::StackName", "qlue-season8-prod"]

Resources:
  # ==============================================================================
  # DYNAMODB TABLES
  # ==============================================================================

  QlueCoreTableV2:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      TableClass: STANDARD
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      SSESpecification:
        SSEEnabled: true
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
        - AttributeName: userId
          AttributeType: S
        - AttributeName: profileKey
          AttributeType: S
        - AttributeName: email
          AttributeType: S
        - AttributeName: phone
          AttributeType: S
        - AttributeName: authProviderKey
          AttributeType: S
        - AttributeName: resumeId
          AttributeType: S
        - AttributeName: activeResumeKey
          AttributeType: S
        - AttributeName: fileHash
          AttributeType: S
        - AttributeName: sessionId
          AttributeType: S
        - AttributeName: sessionKey
          AttributeType: S
        - AttributeName: startedAt
          AttributeType: S
        - AttributeName: statusKey
          AttributeType: S
        - AttributeName: feedbackStatus
          AttributeType: S
        - AttributeName: feedbackStatusKey
          AttributeType: S
        - AttributeName: feedbackId
          AttributeType: S
        - AttributeName: notificationKey
          AttributeType: S
        - AttributeName: unreadKey
          AttributeType: S
        - AttributeName: type
          AttributeType: S
        - AttributeName: sentAt
          AttributeType: N
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: EmailIndex
          KeySchema:
            - AttributeName: email
              KeyType: HASH
            - AttributeName: userId
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: PhoneIndex
          KeySchema:
            - AttributeName: phone
              KeyType: HASH
            - AttributeName: userId
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: AuthProviderIndex
          KeySchema:
            - AttributeName: authProviderKey
              KeyType: HASH
            - AttributeName: userId
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: ResumeIdIndex
          KeySchema:
            - AttributeName: resumeId
              KeyType: HASH
          Projection:
            ProjectionType: ALL
        - IndexName: ResumeHashIndex
          KeySchema:
            - AttributeName: fileHash
              KeyType: HASH
            - AttributeName: userId
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: ActiveResumeIndex
          KeySchema:
            - AttributeName: userId
              KeyType: HASH
            - AttributeName: activeResumeKey
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: SessionIdIndex
          KeySchema:
            - AttributeName: sessionId
              KeyType: HASH
            - AttributeName: userId
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: SessionStatusIndex
          KeySchema:
            - AttributeName: userId
              KeyType: HASH
            - AttributeName: statusKey
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: FeedbackStatusIndex
          KeySchema:
            - AttributeName: feedbackStatus
              KeyType: HASH
            - AttributeName: feedbackStatusKey
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: FeedbackIdIndex
          KeySchema:
            - AttributeName: feedbackId
              KeyType: HASH
          Projection:
            ProjectionType: ALL
        - IndexName: UserSessionTimeIndex
          KeySchema:
            - AttributeName: userId
              KeyType: HASH
            - AttributeName: startedAt
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: UnreadNotificationIndex
          KeySchema:
            - AttributeName: userId
              KeyType: HASH
            - AttributeName: unreadKey
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: NotificationTypeIndex
          KeySchema:
            - AttributeName: type
              KeyType: HASH
            - AttributeName: sentAt
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

  TranscriptsTableV2:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      SSESpecification:
        SSEEnabled: true
      AttributeDefinitions:
        - AttributeName: sessionId
          AttributeType: S
        - AttributeName: turnKey
          AttributeType: S
        - AttributeName: userId
          AttributeType: S
        - AttributeName: createdAt
          AttributeType: S
        - AttributeName: moduleConcept
          AttributeType: S
        - AttributeName: conceptKey
          AttributeType: S
      KeySchema:
        - AttributeName: sessionId
          KeyType: HASH
        - AttributeName: turnKey
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: UserTranscriptIndex
          KeySchema:
            - AttributeName: userId
              KeyType: HASH
            - AttributeName: createdAt
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: ModuleConceptIndex
          KeySchema:
            - AttributeName: moduleConcept
              KeyType: HASH
            - AttributeName: conceptKey
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

  WSConnectionsTableV2:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      SSESpecification:
        SSEEnabled: true
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
      AttributeDefinitions:
        - AttributeName: userId
          AttributeType: S
        - AttributeName: connectionKey
          AttributeType: S
        - AttributeName: connectionId
          AttributeType: S
        - AttributeName: sessionId
          AttributeType: S
      KeySchema:
        - AttributeName: userId
          KeyType: HASH
        - AttributeName: connectionKey
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: ConnectionIdIndex
          KeySchema:
            - AttributeName: connectionId
              KeyType: HASH
            - AttributeName: userId
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: SessionConnectionIndex
          KeySchema:
            - AttributeName: sessionId
              KeyType: HASH
            - AttributeName: connectionKey
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

  # ==============================================================================
  # S3 BUCKETS
  # ==============================================================================
  ResumesBucket:
    Type: AWS::S3::Bucket
    Properties:
      VersioningConfiguration:
        Status: Enabled
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      LifecycleConfiguration:
        Rules:
          - Id: TransitionToIA
            Status: Enabled
            Transitions:
              - TransitionInDays: 90
                StorageClass: STANDARD_IA
      CorsConfiguration:
        CorsRules:
          - AllowedHeaders: ["*"]
            AllowedMethods: ["PUT"]
            AllowedOrigins: ["*"]

  ScrapedContentBucket:
    Type: AWS::S3::Bucket
    Properties:
      VersioningConfiguration:
        Status: Enabled
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      LifecycleConfiguration:
        Rules:
          - Id: AutoDelete
            Status: Enabled
            ExpirationInDays: 30

  # ==============================================================================
  # API GATEWAYS
  # ==============================================================================
  RestApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: prod
      MethodSettings:
        - ResourcePath: "/*"
          HttpMethod: "*"
          ThrottlingBurstLimit: 20
          ThrottlingRateLimit: 10
      BinaryMediaTypes:
        - "application/octet-stream"
        - "audio/pcm"
        - "multipart/form-data"
      Cors:
        AllowMethods: "'OPTIONS,GET,POST,PUT,DELETE'"
        AllowHeaders: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token,X-Requested-With'"
        AllowOrigin: "'*'"
      GatewayResponses:
        DEFAULT_4XX:
          ResponseParameters:
            Headers:
              Access-Control-Allow-Origin: "'*'"
              Access-Control-Allow-Headers: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token,X-Requested-With'"
              Access-Control-Allow-Methods: "'OPTIONS,GET,POST,PUT,DELETE'"
      Auth:
        DefaultAuthorizer: FirebaseAuthorizer
        Authorizers:
          FirebaseAuthorizer:
            FunctionPayloadType: TOKEN
            FunctionArn: !GetAtt ValidateTokenFunction.Arn
            Identity:
              Header: Authorization
            AuthorizerResultTtlInSeconds: 0

  WebSocketApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: QlueWebSocket
      ProtocolType: WEBSOCKET
      RouteSelectionExpression: "$request.body.type"

  WebSocketStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      StageName: prod
      AutoDeploy: true
      DefaultRouteSettings:
        ThrottlingBurstLimit: 200
        ThrottlingRateLimit: 100
      ApiId: !Ref WebSocketApi

  ConnectRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref WebSocketApi
      RouteKey: $connect
      Target: !Join ["/", ["integrations", !Ref ConnectIntegration]]
  DisconnectRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref WebSocketApi
      RouteKey: $disconnect
      Target: !Join ["/", ["integrations", !Ref DisconnectIntegration]]
  DefaultRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref WebSocketApi
      RouteKey: $default
      Target: !Join ["/", ["integrations", !Ref DefaultIntegration]]

  ConnectIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref WebSocketApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${ConnectHandlerFunction.Arn}/invocations
  DisconnectIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref WebSocketApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${DisconnectHandlerFunction.Arn}/invocations
  DefaultIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref WebSocketApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${SendTextHandlerFunction.Arn}/invocations

  ConnectPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !GetAtt ConnectHandlerFunction.Arn
      Principal: apigateway.amazonaws.com
  DisconnectPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !GetAtt DisconnectHandlerFunction.Arn
      Principal: apigateway.amazonaws.com
  DefaultPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !GetAtt SendTextHandlerFunction.Arn
      Principal: apigateway.amazonaws.com

  # ==============================================================================
  # LAMBDA LAYER
  # ==============================================================================
  QlueSharedLayer:
    Type: AWS::Serverless::LayerVersion
    Properties:
      ContentUri: src/lib/
      CompatibleRuntimes:
        - nodejs20.x
      RetentionPolicy: Retain

  AppDependenciesLayer:
    Type: AWS::Serverless::LayerVersion
    Metadata:
      BuildMethod: nodejs20.x
    Properties:
      ContentUri: layers/dependencies/
      CompatibleRuntimes:
        - nodejs20.x
      RetentionPolicy: Retain

  # ==============================================================================
  # SNS TOPICS
  # ==============================================================================
  FeedbackTriggerTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: qlue-feedback-trigger

  # ==============================================================================
  # SECRETS
  # ==============================================================================
  FirebaseServiceAccountSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Description: Firebase Service Account for auth verification
  BedrockConfigSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Description: Bedrock configuration and model IDs
  ScraperApiKeySecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Description: Scraper API Key for website analysis
  FcmServerKeySecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Description: FCM Server Key for push notifications

  # ==============================================================================
  # LAMBDA FUNCTIONS
  # ==============================================================================

  # ========= AUTH =========
  ValidateTokenFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: handlers/auth/validateToken.handler
      CodeUri: src/
      MemorySize: 256
      Timeout: 10
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref QlueCoreTableV2
        - AWSSecretsManagerGetSecretValuePolicy:
            SecretArn: !Ref FirebaseServiceAccountSecret

  RegisterUserFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: handlers/auth/registerUser.handler
      CodeUri: src/
      MemorySize: 256
      Timeout: 15
      Events:
        Api:
          Type: Api
          Properties:
            Path: /auth/register
            Method: post
            RestApiId: !Ref RestApi
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref QlueCoreTableV2
        - AWSSecretsManagerGetSecretValuePolicy:
            SecretArn: !Ref FirebaseServiceAccountSecret

  LoginUserFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: handlers/auth/loginUser.handler
      CodeUri: src/
      MemorySize: 256
      Timeout: 10
      Events:
        Api:
          Type: Api
          Properties:
            Path: /auth/login
            Method: post
            RestApiId: !Ref RestApi
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref QlueCoreTableV2
        - AWSSecretsManagerGetSecretValuePolicy:
            SecretArn: !Ref FirebaseServiceAccountSecret

  LoginWithGoogleFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: handlers/auth/loginWithGoogle.handler
      CodeUri: src/
      MemorySize: 256
      Timeout: 15
      Events:
        Api:
          Type: Api
          Properties:
            Path: /auth/google
            Method: post
            RestApiId: !Ref RestApi
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref QlueCoreTableV2
        - AWSSecretsManagerGetSecretValuePolicy:
            SecretArn: !Ref FirebaseServiceAccountSecret

  RefreshTokenFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: handlers/auth/refreshToken.handler
      CodeUri: src/
      MemorySize: 256
      Timeout: 10
      Events:
        Api:
          Type: Api
          Properties:
            Path: /auth/refresh
            Method: post
            RestApiId: !Ref RestApi
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref QlueCoreTableV2
        - AWSSecretsManagerGetSecretValuePolicy:
            SecretArn: !Ref FirebaseServiceAccountSecret

  LogoutUserFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: handlers/auth/logoutUser.handler
      CodeUri: src/
      MemorySize: 256
      Timeout: 10
      Events:
        Api:
          Type: Api
          Properties:
            Path: /auth/logout
            Method: post
            RestApiId: !Ref RestApi
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref QlueCoreTableV2
        - AWSSecretsManagerGetSecretValuePolicy:
            SecretArn: !Ref FirebaseServiceAccountSecret

  DeleteAccountFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: handlers/auth/deleteAccount.handler
      CodeUri: src/
      MemorySize: 512
      Timeout: 30
      Events:
        Api:
          Type: Api
          Properties:
            Path: /auth/account
            Method: delete
            RestApiId: !Ref RestApi
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref QlueCoreTableV2
        - AWSSecretsManagerGetSecretValuePolicy:
            SecretArn: !Ref FirebaseServiceAccountSecret

  GetUserProfileFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: handlers/auth/getUserProfile.handler
      CodeUri: src/
      MemorySize: 256
      Timeout: 10
      Events:
        Api:
          Type: Api
          Properties:
            Path: /auth/profile
            Method: get
            RestApiId: !Ref RestApi
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref QlueCoreTableV2
        - AWSSecretsManagerGetSecretValuePolicy:
            SecretArn: !Ref FirebaseServiceAccountSecret

  UpdateUserProfileFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: handlers/auth/updateUserProfile.handler
      CodeUri: src/
      MemorySize: 256
      Timeout: 10
      Events:
        Api:
          Type: Api
          Properties:
            Path: /auth/profile
            Method: put
            RestApiId: !Ref RestApi
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref QlueCoreTableV2
        - AWSSecretsManagerGetSecretValuePolicy:
            SecretArn: !Ref FirebaseServiceAccountSecret

  SyncUserFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: handlers/auth/syncUser.handler
      CodeUri: src/
      MemorySize: 256
      Timeout: 10
      Events:
        Api:
          Type: Api
          Properties:
            Path: /auth/sync
            Method: post
            RestApiId: !Ref RestApi
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref QlueCoreTableV2
        - AWSSecretsManagerGetSecretValuePolicy:
            SecretArn: !Ref FirebaseServiceAccountSecret

  UpdateFcmTokenFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: handlers/auth/updateFcmToken.handler
      CodeUri: src/
      MemorySize: 256
      Timeout: 10
      Events:
        Api:
          Type: Api
          Properties:
            Path: /auth/fcm-token
            Method: post
            RestApiId: !Ref RestApi
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref QlueCoreTableV2

  # ========= RESUME =========
  GeneratePresignedUrlFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: handlers/resume/generatePresignedUrl.handler
      CodeUri: src/
      MemorySize: 256
      Timeout: 10
      Events:
        Api:
          Type: Api
          Properties:
            Path: /resume/upload-url
            Method: post
            RestApiId: !Ref RestApi
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref QlueCoreTableV2
        - S3CrudPolicy:
            BucketName: !Ref ResumesBucket

  ProcessResumeUploadFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: handlers/resume/processResumeUpload.handler
      CodeUri: src/
      MemorySize: 1024
      Timeout: 120
      Events:
        Api:
          Type: Api
          Properties:
            Path: /resume/process
            Method: post
            RestApiId: !Ref RestApi
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref QlueCoreTableV2
        - DynamoDBCrudPolicy:
            TableName: !Ref QlueCoreTableV2
        - S3CrudPolicy:
            BucketName: !Ref ResumesBucket
        - Statement:
            - Effect: Allow
              Action:
                - textract:AnalyzeDocument
                - textract:DetectDocumentText
                - textract:StartDocumentAnalysis
                - textract:GetDocumentAnalysis
              Resource: "*"
        - Statement:
            - Effect: Allow
              Action:
                - bedrock:InvokeModel
                - bedrock:InvokeModelWithResponseStream
              Resource: "*"
        - AWSSecretsManagerGetSecretValuePolicy:
            { SecretArn: !Ref FirebaseServiceAccountSecret }
        - Statement:
            - Effect: Allow
              Action: lambda:InvokeFunction
              Resource: !Sub "arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:${AWS::StackName}-ProcessResumeUploadFunction-*"

  GetResumeListFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: handlers/resume/getResumeList.handler
      CodeUri: src/
      MemorySize: 256
      Timeout: 10
      Events:
        Api:
          Type: Api
          Properties:
            Path: /resume/list
            Method: get
            RestApiId: !Ref RestApi
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref QlueCoreTableV2
        - S3CrudPolicy:
            BucketName: !Ref ResumesBucket

  GetResumeDetailFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: handlers/resume/getResumeDetail.handler
      CodeUri: src/
      MemorySize: 256
      Timeout: 10
      Events:
        Api:
          Type: Api
          Properties:
            Path: /resume/detail
            Method: get
            RestApiId: !Ref RestApi
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref QlueCoreTableV2
        - S3CrudPolicy:
            BucketName: !Ref ResumesBucket

  UpdateResumeParsedDataFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: handlers/resume/updateResumeParsedData.handler
      CodeUri: src/
      MemorySize: 256
      Timeout: 10
      Events:
        Api:
          Type: Api
          Properties:
            Path: /resume/detail
            Method: put
            RestApiId: !Ref RestApi
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref QlueCoreTableV2
        - S3CrudPolicy:
            BucketName: !Ref ResumesBucket

  DeleteResumeFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: handlers/resume/deleteResume.handler
      CodeUri: src/
      MemorySize: 256
      Timeout: 10
      Events:
        Api:
          Type: Api
          Properties:
            Path: /resume/detail
            Method: delete
            RestApiId: !Ref RestApi
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref QlueCoreTableV2
        - DynamoDBCrudPolicy:
            TableName: !Ref QlueCoreTableV2
        - S3CrudPolicy:
            BucketName: !Ref ResumesBucket

  SetActiveResumeFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: handlers/resume/setActiveResume.handler
      CodeUri: src/
      MemorySize: 256
      Timeout: 10
      Events:
        Api:
          Type: Api
          Properties:
            Path: /resume/active
            Method: put
            RestApiId: !Ref RestApi
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref QlueCoreTableV2
        - S3CrudPolicy:
            BucketName: !Ref ResumesBucket

  ValidateResumeHashFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: handlers/resume/validateResumeHash.handler
      CodeUri: src/
      MemorySize: 256
      Timeout: 10
      Events:
        Api:
          Type: Api
          Properties:
            Path: /resume/validate-hash
            Method: post
            RestApiId: !Ref RestApi
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref QlueCoreTableV2
        - S3CrudPolicy:
            BucketName: !Ref ResumesBucket

  # ========= INTERVIEW =========
  InitializeSessionFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: handlers/interview/initializeSession.handler
      CodeUri: src/
      MemorySize: 256
      Timeout: 15
      Events:
        Api:
          Type: Api
          Properties:
            Path: /interview/init
            Method: post
            RestApiId: !Ref RestApi
      Policies:
