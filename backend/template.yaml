      Policies:
        - S3CrudPolicy: { BucketName: !Ref ScrapedContentBucket }
        - AWSSecretsManagerGetSecretValuePolicy:
            { SecretArn: !Ref ScraperApiKeySecret }
        - AWSSecretsManagerGetSecretValuePolicy:
            { SecretArn: !Ref FirebaseServiceAccountSecret }

  ValidateWebsiteFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: handlers/website/validateWebsite.handler
      CodeUri: src/
      MemorySize: 512
      Timeout: 30
      Events:
        Api:
          Type: Api
          Properties:
            Path: /website/validate
            Method: post
            RestApiId: !Ref RestApi
      Policies:
        - S3CrudPolicy: { BucketName: !Ref ScrapedContentBucket }
        - Statement:
            [{ Effect: Allow, Action: ["bedrock:InvokeModel"], Resource: "*" }]
        - AWSSecretsManagerGetSecretValuePolicy:
            { SecretArn: !Ref ScraperApiKeySecret }
        - AWSSecretsManagerGetSecretValuePolicy:
            { SecretArn: !Ref FirebaseServiceAccountSecret }

  # ==============================================================================
  # CLOUDWATCH ALARMS
  # ==============================================================================
  LambdaErrorRateAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: "High Lambda Error Rate"
      Namespace: AWS/Lambda
      MetricName: Errors
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 5
      ComparisonOperator: GreaterThanThreshold

  DynamoDBThrottledRequestsAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: "DynamoDB Throttling detected"
      Namespace: AWS/DynamoDB
      MetricName: ThrottledRequests
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanThreshold
      AlarmActions:
        - !Ref FeedbackTriggerTopic

  APIGateway5xxErrorRateAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: "API Gateway 5XX errors"
      Namespace: AWS/ApiGateway
      MetricName: 5XXError
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 5
      ComparisonOperator: GreaterThanThreshold
      AlarmActions:
        - !Ref FeedbackTriggerTopic

  WebSocketConnectionDropRateAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: "API GW Websocket connection drops"
      Namespace: AWS/ApiGateway
      MetricName: ConnectError
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 10
      ComparisonOperator: GreaterThanThreshold

  BedrockInvocationLatencyAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: "Bedrock Invocation Latency > 30s"
      Namespace: AWS/Bedrock
      MetricName: InvocationLatency
      ExtendedStatistic: p99
      Period: 300
      EvaluationPeriods: 1
      Threshold: 30000
      ComparisonOperator: GreaterThanThreshold

  PollySynthesisFailureAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: "Polly Synthesis Errors"
      Namespace: AWS/Polly
      MetricName: 5XXError
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanThreshold

Outputs:
  RestApiUrl:
    Description: "API Gateway endpoint URL for Prod stage"
    Value: !Sub "https://${RestApi}.execute-api.${AWS::Region}.amazonaws.com/prod/"
  WebSocketUrl:
    Description: "WebSocket endpoint URL for Prod stage"
    Value: !Sub "wss://${WebSocketApi}.execute-api.${AWS::Region}.amazonaws.com/prod"
